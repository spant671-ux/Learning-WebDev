<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice CSS Example</title>
    <style>
        /* Using a system font stack for modern look without external requests */
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #1a1a1a;
        }
        
        .profile-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 350px;
            width: 100%;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 36px;
            font-weight: bold;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            font-weight: 700;
        }

        p {
            margin: 0 0 25px 0;
            color: #666;
            line-height: 1.5;
        }

        .action-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            width: 100%;
        }

        .action-btn:hover {
            background: #1d4ed8;
        }

        .action-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <div class="avatar">UI</div>
        <h1>CSS Practice</h1>
        <p>This is a modern, responsive card component to practice your CSS skills.</p>
        <button class="action-btn">Learn More</button>
    </div>
</body>
</html>
