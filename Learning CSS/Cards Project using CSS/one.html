<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    

    <div class="container">
        <div class="card">
            <img src="icon.jpg">
            <div class="textBox">
                <h2>Order Summary</h2>
            <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Expedita ipsum molestiae soluta. Eos fuga corrupti officia blanditiis dicta repellendus magnam!</p>
            </div>
            <div id="amountBox">
                <div id="leftBox">
                    <div id="imgBox">
                        <img src="music.png"/>
                    </div>
                    <div id="textAmount">
                        <p>Amount</p>
                        <p>$99.9/year</p>
                    </div>

                </div>
                <div id="rightBox">
                    <a href="#">Change</a>
                </div>

            </div>

            <button id="paymentButton">
                Proceed to pay
            </button>

            <div class="cancelBox">
                <a href="#">Cancel Order</a>
            </div>
        </div>
    </div>


</body>
</html>
