<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            border: 2px solid black;
            background-color: bisque;
            display:flex;
            flex-direction: row;
            width:450px;
            padding:2px;
            margin:10px;
        }
        #boxleft{
            background-color: aquamarine;
            border:1px solid blue;
            width:47%;
            margin:3px;
            padding:2px;
            display: flex;
            flex-direction: column;
        }
        #boxright{
            background-color: yellow;
            border:1px solid orange;
            width:47%;
            margin:3px;
            padding:2px;
        }
        p{
            border:1px solid red;

        }
        img{
            width:170px;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div id="boxleft">
<p>Text 1</p>
<p>Text 2</p>
        </div>
        <div id="boxright">
<img src="1.jpg">
        </div>
    </div>
</body>
</html>
