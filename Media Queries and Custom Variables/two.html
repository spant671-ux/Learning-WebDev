<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Flex container housing the layout's left and right sides */
        .container {
            border: 2px solid black;
            background-color: bisque;
            display: flex;
            flex-direction: row; /* Default layout: side-by-side columns */
            width: 450px; /* Fixed width container */
            padding: 2px;
            margin: 10px;
        }

        /* Left column inside the container, also a flex column layout */
        #boxleft {
            background-color: aquamarine;
            border: 1px solid blue;
            width: 47%; /* occupy roughly half of the container width */
            margin: 3px;
            padding: 2px;
            display: flex;
            flex-direction: column; /* elements inside stack vertically */
        }

        /* Right column inside the container */
        #boxright {
            background-color: yellow;
            border: 1px solid orange;
            width: 47%; /* occupy roughly half of the container width */
            margin: 3px;
            padding: 2px;
        }

        /* Border to visualize paragraphs */
        p {
            border: 1px solid red;
        }

        /* Responsive image width matching the container column space */
        img {
            width: 170px;
        }

        /* 
           Media query targeting viewports up to 640px.
           Changes the flex-direction to column so left and right side stack vertically.
        */
        @media (max-width: 640px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- A simple two-column layout that shifts to a vertical layout on small screens -->
    <div class="container">
        <!-- Left container containing paragraphs -->
        <div id="boxleft">
            <p>Text 1</p>
            <p>Text 2</p>
        </div>
        <!-- Right container containing an image -->
        <div id="boxright">
            <img src="1.jpg">
        </div>
    </div>
</body>
</html>
