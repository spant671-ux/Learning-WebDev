<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms and Input Tags</title>
</head>
<body>
    <hi>Form to Apply for TA</hi>
    
    <!-- Main form element for user input submission -->
    <form action="post"></form>
    
    <!-- Text input field for username -->
    <div>
    <label for="username"></label>
    <input type = "text" id="username" name="username" placeholder="Enter your username">
    </div>
    
    <!-- Radio buttons for gender selection -->
    <div>
        <input type="radio" id="Male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
    </div>
    
    <!-- Checkbox input for subscription option -->
    <div>
        <input type = "checkbox" id = "subscribe" name="subscribe" value="yes">
        <label for="subscribe">Subscribe to newsletter</label>
    </div>
    
    <!-- Textarea for multi-line text input -->
    <div>
        <label for="comment">Comment:</label>
        <textarea name="comment" rows="4" cols="50">
        </textarea>
    </div>
    
    <!-- Dropdown selection menu for fruits -->
    <div>
        <select name="fruits">
            <option value="apple">Apple</option>
            <option value="banana">Banana</option>
            <option value="orange">Orange</option>
        </select>
    </div>
</body>
</html>
