<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Manager</title>
</head>
<body>
    <!-- Main heading for the page -->
    <h1>My Bookmarks</h1>
    
    <!-- Section for primary frequently used bookmarks -->
    <h2>Primary Bookmarks</h2>
   <!-- The target="_blank" attribute opens the link in a new tab -->
   <p><a target="_blank" href="https://google.com" >Open Google</a></p>
   <p><a href="https://reddit.com" >Open Reddit</a></p>
   <p><a target="_blank" href="https://riotgames.com" >Open Riot Games</a></p>
   <p><a href="https://store.steampowered.com/" >Open Steam</a></p>

    <!-- Section for other secondary bookmarks -->
    <h2>Secondary Bookmarks</h2>  
    <p><a href="https:youtube.com">Open Youtube</a></p>
    <p><a href="https://wikipedia.org">Open Wikipedia</a></p>
    
  

</body>
</html>
