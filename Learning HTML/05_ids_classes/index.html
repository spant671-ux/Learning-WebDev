<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta tags for character encoding and responsive viewport -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Title of the webpage -->
    <title>ID and Classes</title>
    <!-- Linking the external CSS stylesheet (style.css) -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 
      The 'id' attribute provides a unique identifier for an element (e.g., id="firstdiv"). 
      The 'class' attribute assigns one or more class names to an element for styling (e.g., class="red bg-yellow").
    -->
    <div id="firstdiv" class="red bg-yellow">First</div>
    
    <!-- This element uses only an 'id' attribute -->
    <div id="seconddiv">Second</div>
</body>
</html>
