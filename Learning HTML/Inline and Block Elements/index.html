<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline and Block Elements</title>
    <link rel ="stylesheet" href="style.css">
</head>
<body>
    <!-- Block element: Paragraph -->
    <p>This is a paragraph. It is a block element.</p>
    
    <!-- Inline element: Anchor link -->
    <a href="https://google.com">Google</a>
    
    <!-- Block element: Div container -->
    <div>
        I am a Block Element.
    </div>
    
    <!-- Inline element: Span container -->
    <span>I am an Inline Element.</span>
    
    <!-- Inline element: Anchor link -->
    <a href ="https://facebook.com">Facebook</a>
    
</body>
</html>
