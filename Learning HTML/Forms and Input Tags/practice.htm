<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practice</title>
  </head>
  <body>
    <!-- Main heading for the page -->
    <h1>This is a Practice Form</h1>
    
    <!-- Form wrapper element -->
    <form action="post">
      
      <!-- Input group for Name field -->
      <div>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Enter Your Name"
          required
        />
      </div>
      
      <!-- Input group for City field -->
      <div>
        <input
          type="text"
          id="city"
          name="city"
          placeholder="Enter Your City"
          required
        />
      </div>
      
      <!-- Input group for Pincode field -->
      <div>
        <input
          type="text"
          id="pincode"
          name="pincode"
          placeholder="Enter your Pincode"
          required
        />
      </div>
    </form>
  </body>
</html>
