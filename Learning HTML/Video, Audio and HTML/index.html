<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Video Element: Plays a local video file with playback controls, looping enabled, and a poster image -->
    <video src="video.mp4" height="455" controls loop poster="image.jpg"></video>
    
    <div>
        <!-- Audio Element: Plays a local audio file with browser media controls -->
        <audio src="audio.mp3" controls></audio>
    </div>

    <div>
        <!-- SVG Element: Draws a scalable vector graphic (a red circle with a black border) -->
        <svg height="100" width="100">
            <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="red" />
        </svg>
    </div>
    
    <div>
        <!-- Iframe Element: Embeds an external YouTube video player into the webpage -->
        <iframe width="560" height="315" src="https://www.youtube.com/embed/iOeebAM_C5g?si=fDBdfIhfZKXVO7YF" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
</body>
</html>
